<div class="grid md:grid-cols-2">
  <!-- selected vehicle type is passed here and listens for updates-->
  <app-vehicle-form
    [vehicleType]="vehicleType"
    (vehicleTypeChange)="vehicleType = $event"
  ></app-vehicle-form>

  <!-- reuse vehicle type to update preview image-->
  <app-vehicle-image
    [vehicleType]="vehicleType"
  ></app-vehicle-image>
</div>
